name: Trainer tests

on:
  push:
  pull_request:
  workflow_dispatch:
    inputs:
      run_cuda_gate:
        description: Run the required CUDA/CuPy gate on a trusted self-hosted runner
        required: false
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  atomic-v3-python-compatibility:
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.9', '3.10', '3.11', '3.12']
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: requirements-CPU.txt

      - name: Install isolated Atomic V3 import dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install --index-url https://download.pytorch.org/whl/cpu torch==2.7.1+cpu
          python -m pip install numpy==1.26.4

      - name: Compile and import every Atomic V3 module
        run: |
          python -m compileall -q atomic_v3
          python -c "import importlib, pkgutil, atomic_v3; modules = [item.name for item in pkgutil.iter_modules(atomic_v3.__path__, atomic_v3.__name__ + '.')]; [importlib.import_module(name) for name in modules]; print(len(modules), 'Atomic V3 modules imported')"

  cpu:
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Fetch audited Atomic-Stockfish main ref
        run: git -C external/Atomic-Stockfish fetch --no-tags --depth=2147483647 origin +refs/heads/main:refs/remotes/origin/main

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: pip
          cache-dependency-path: requirements-CPU.txt

      - name: Install CPU test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-CPU.txt

      - name: Configure native loader
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX="${{ github.workspace }}" -DBUILD_TESTING=ON

      - name: Build and install native loader
        run: cmake --build build --config Release --target install

      - name: Native behavioral tests
        run: ctest --test-dir build -C Release --output-on-failure

      - name: Python behavioral tests
        run: python -m pytest -q

  cuda-required:
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_cuda_gate }}
    timeout-minutes: 30
    runs-on: [self-hosted, cuda]

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Fetch audited Atomic-Stockfish main ref
        run: git -C external/Atomic-Stockfish fetch --no-tags --depth=2147483647 origin +refs/heads/main:refs/remotes/origin/main

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install distributed CUDA 11.8 dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Configure native loader
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX="${{ github.workspace }}" -DBUILD_TESTING=ON

      - name: Build and install native loader
        run: cmake --build build --config Release --target install

      - name: Native behavioral tests
        run: ctest --test-dir build -C Release --output-on-failure

      - name: Required CUDA/CuPy behavioral gate
        env:
          ATOMIC_REQUIRE_CUDA_TESTS: '1'
        run: python -m pytest -q
