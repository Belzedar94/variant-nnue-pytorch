name: Trainer tests

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  cpu:
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: pip

      - name: Install CPU test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install torch==2.1.2 --index-url https://download.pytorch.org/whl/cpu
          python -m pip install "numpy<2" chess pytest tensorboard pytorch-lightning==1.9.5 torchmetrics==0.11.4

      - name: Configure native loader
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX="${{ github.workspace }}" -DBUILD_TESTING=ON

      - name: Build and install native loader
        run: cmake --build build --config Release --target install

      - name: Native behavioral tests
        run: ctest --test-dir build -C Release --output-on-failure

      - name: Python behavioral tests
        run: python -m pytest -q
